version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15
    container_name: deal-aggregator-db
    environment:
      POSTGRES_USER: deal_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: deal_aggregator
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deal_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  api:
    build: ./backend
    container_name: deal-aggregator-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://deal_user:password@db:5432/deal_aggregator
      SECRET_KEY: dev-secret-key-change-in-production
      DEBUG: "true"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # React Frontend
  web:
    build: ./frontend
    container_name: deal-aggregator-web
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000/api
    volumes:
      - ./frontend/src:/app/src
    command: npm run dev

volumes:
  postgres_data:

networks:
  default:
    name: deal-aggregator
